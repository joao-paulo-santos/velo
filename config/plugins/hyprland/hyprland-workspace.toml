name = "hyprland-workspace"
display_label = "Change Workspace"
type = "select"
list_cmd = "hyprctl workspaces -j | jq -c '.[] | {name: .name, value: .name}'"
format = "json"
label_field = "name"
value_field = "value"
as = "selection"
template = "hyprctl dispatch workspace name:{selection}"
execution_type = "exec"
