name = "hyprland"
display_label = "Window Management"
context_name = "Window Management"
type = "list"
global = true
children = ["hyprland-focus", "hyprland-workspace"]
---
name = "hyprland-focus"
display_label = "Focus Windows"
type = "select"
list_cmd = "hyprctl clients -j | jq -c '.[] | {name: (.class + \" - \" + (.title // \"\") | .[0:50]), address: .address}'"
format = "json"
label_field = "name"
value_field = "address"
as = "selection"
template = "hyprctl dispatch focuswindow address:{selection}"
execution_type = "exec"
---
name = "hyprland-workspace"
display_label = "Change Workspace"
type = "select"
list_cmd = "hyprctl workspaces -j | jq -c '.[] | {name: .name, value: .name}'"
format = "json"
label_field = "name"
value_field = "value"
as = "selection"
template = "hyprctl dispatch workspace name:{selection}"
execution_type = "exec"
