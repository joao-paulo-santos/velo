name = "hyprland-focus"
display_label = "Focus Windows"
type = "select"
list_cmd = "hyprctl clients -j | jq -c '.[] | {name: (.class + \" - \" + (.title // \"\") | .[0:50]), address: .address}'"
format = "json"
label_field = "name"
value_field = "address"
as = "selection"
template = "hyprctl dispatch focuswindow address:{selection}"
execution_type = "exec"
