name = "wifi"
display_label = "Wifi"
context_name = "Wifi"
type = "list"
global = true
teleport = true
depends = ["nmcli"]
children = ["wifi-connect", "wifi-reconnect", "wifi-forget"]
---
name = "wifi-connect"
display_label = "Connect"
type = "select"
list_cmd = "bash -c '~/.config/velo/plugins/wifi/list.sh'"
format = "json"
label_field = "name"
value_field = "id"
as = "network"
template = "nmcli device wifi connect '{network}' password '{password}'"
next = "enter-password"
---
name = "wifi-reconnect"
display_label = "Reconnect"
type = "exec"
template = "nmcli connection up \"$(nmcli -t -f NAME,DEVICE connection show --active | grep :wifi | cut -d: -f1)\" && notify-send WiFi 'Reconnected' || notify-send WiFi 'Failed to reconnect'"
execution_type = "exec"
---
name = "wifi-forget"
display_label = "Forget Network"
type = "select"
list_cmd = "bash -c '~/.config/velo/plugins/wifi/saved.sh'"
format = "json"
label_field = "name"
value_field = "id"
as = "network"
template = "nmcli connection delete '{network}'"
execution_type = "exec"
